name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build and release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write   # needed to create releases

jobs:
  build:
    name: build ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            rid: linux-arm64
            archive: tar.gz
          # macos-13 (Intel) runners are throttled on the free tier;
          # Apple Silicon covers most real-world Mac developers today and
          # Rosetta 2 runs x64 binaries when needed. Bring osx-x64 back
          # if there's demand.
          - runner: macos-latest    # Apple silicon
            rid: osx-arm64
            archive: tar.gz
          - runner: windows-latest
            rid: win-x64
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # NativeAOT on Linux needs a platform linker + zlib headers.
      - name: Install AOT prerequisites (Linux)
        if: startsWith(matrix.rid, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/Brainyz.Cli/Brainyz.Cli.csproj -r ${{ matrix.rid }}

      - name: Publish (AOT)
        run: >
          dotnet publish src/Brainyz.Cli/Brainyz.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --no-restore
          -o dist

      # Drive the just-published AOT binary through the full CRUD workflow.
      # If a given RID's binary is broken (single-file, trim or AOT
      # regression), this catches it before the Release gets published.
      #
      # Non-blocking on linux-arm64: Nelknet.LibSQL.Bindings 0.2.5 does not
      # ship a linux-arm64 libsql.so, so the AOT binary for that RID crashes
      # on first DB open. We still publish the archive (sans native) so
      # advanced users can drop in their own libsql.so compiled for arm64.
      # Flip this back to blocking if/when Nelknet ships the native — the
      # smoke failure signals that it has.
      - name: Smoke test (AOT binary)
        shell: bash
        continue-on-error: ${{ matrix.rid == 'linux-arm64' }}
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            export BRAINZ_BINARY="$GITHUB_WORKSPACE/dist/brainz.exe"
          else
            export BRAINZ_BINARY="$GITHUB_WORKSPACE/dist/brainz"
          fi
          dotnet run tools/smoke-test.cs

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist
          tar -czf ../brainz-${{ matrix.rid }}.tar.gz brainz *.so *.dylib 2>/dev/null || \
          tar -czf ../brainz-${{ matrix.rid }}.tar.gz brainz
          cd ..
          ls -la brainz-${{ matrix.rid }}.tar.gz

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          # Ship the native binary plus any libsql.dll that tagged along.
          $files = Get-ChildItem -Path dist -Include brainz.exe,*.dll -Recurse
          Compress-Archive -Path $files -DestinationPath brainz-${{ matrix.rid }}.zip -Force
          Get-Item brainz-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: brainz-${{ matrix.rid }}
          path: brainz-${{ matrix.rid }}.*

  checksums:
    name: generate SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256SUMS
        run: |
          cd artifacts
          # Literal list — must match the build matrix's artifact names. The
          # linux-arm64 archive ships even when its smoke-test is skipped.
          sha256sum brainz-linux-x64.tar.gz \
                    brainz-linux-arm64.tar.gz \
                    brainz-osx-arm64.tar.gz \
                    brainz-win-x64.zip \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Verify checksums
        run: |
          cd artifacts
          sha256sum -c SHA256SUMS.txt

      - uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: artifacts/SHA256SUMS.txt

  release:
    name: publish GitHub Release
    needs: [build, checksums]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/brainz-*.*
            artifacts/SHA256SUMS.txt

  update-homebrew-tap:
    name: update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Stable tags only. Guard handles both tag-push and workflow_dispatch:
    # on tag-push ref_name is the tag; on workflow_dispatch ref_name is the
    # branch, so we OR-check the input tag as well.
    if: >
      !contains(github.event.inputs.tag || github.ref_name, '-')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Compute release metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch SHA256SUMS from release
        run: |
          curl -fsSL -o SHA256SUMS.txt \
            "https://github.com/FavitoX/brainyz/releases/download/${{ steps.meta.outputs.tag }}/SHA256SUMS.txt"

      - name: Render Formula
        run: |
          bash tools/render-homebrew-formula.sh \
            "${{ steps.meta.outputs.version }}" \
            "${{ steps.meta.outputs.tag }}" \
            SHA256SUMS.txt \
            > Formula-brainyz.rb
          head -30 Formula-brainyz.rb

      - name: Push to chaosfabric/homebrew-tap
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Use '%s\n' (not '%s'): OpenSSH ed25519 keys require a trailing
          # newline after '-----END OPENSSH PRIVATE KEY-----', and GitHub
          # Actions strips the trailing newline of secret values on read.
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone git@github.com:chaosfabric/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp Formula-brainyz.rb tap/Formula/brainyz.rb
          cd tap
          git -c user.name='brainyz-release-bot' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -am "brainyz ${{ steps.meta.outputs.version }}" || {
            echo "No change; formula already at version ${{ steps.meta.outputs.version }}."
            exit 0
          }
          git push
